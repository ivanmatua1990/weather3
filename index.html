<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Weather LED</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 880px;
      height: 440px;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #weather-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 440px;
      height: 80px;
      background: rgba(0, 0, 0, 0.35);
      color: white;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      padding: 8px 16px;
      gap: 14px;
      overflow: hidden;
    }

    #icon {
      font-size: 42px;
      line-height: 1;
      width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    #temp {
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
    }

    #info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    #city {
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
    }

    #desc {
      font-size: 15px;
      opacity: 0.9;
      white-space: nowrap;
    }

    #time {
      font-size: 13px;
      opacity: 0.75;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div id="weather-bar">
    <div id="icon">⛅</div>
    <div id="temp">--°</div>
    <div id="info">
      <div id="city">Караганда</div>
      <div id="desc">Загрузка погоды...</div>
      <div id="time"></div>
    </div>
  </div>

  <script>
    const LAT = 49.8047;
    const LON = 73.1094;
    const CITY = "Караганда";

    const codeMap = {
      0: ["☀️", "Ясно"],
      1: ["🌤️", "Преимущественно ясно"],
      2: ["⛅", "Переменная облачность"],
      3: ["☁️", "Пасмурно"],
      45: ["🌫️", "Туман"],
      48: ["🌫️", "Туман"],
      51: ["🌦️", "Морось"],
      53: ["🌦️", "Морось"],
      55: ["🌦️", "Морось"],
      61: ["🌧️", "Дождь"],
      63: ["🌧️", "Дождь"],
      65: ["🌧️", "Сильный дождь"],
      71: ["🌨️", "Снег"],
      73: ["🌨️", "Снег"],
      75: ["❄️", "Сильный снег"],
      80: ["🌦️", "Ливень"],
      81: ["🌦️", "Ливень"],
      82: ["⛈️", "Сильный ливень"],
      95: ["⛈️", "Гроза"],
      96: ["⛈️", "Гроза"],
      99: ["⛈️", "Гроза"]
    };

    async function loadWeather() {
      try {
        const url =
          `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
          `&current=temperature_2m,weather_code,wind_speed_10m` +
          `&timezone=Asia%2FAlmaty`;

        const res = await fetch(url);
        const data = await res.json();

        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        const wind = Math.round(data.current.wind_speed_10m);
        const item = codeMap[code] || ["⛅", "Погода"];

        document.getElementById("icon").textContent = item[0];
        document.getElementById("temp").textContent = `${temp}°`;
        document.getElementById("city").textContent = CITY;
        document.getElementById("desc").textContent = `${item[1]} · ветер ${wind} км/ч`;

        const now = new Date();
        document.getElementById("time").textContent =
          now.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
      } catch (e) {
        document.getElementById("desc").textContent = "Нет соединения с погодой";
      }
    }

    loadWeather();
    setInterval(loadWeather, 10 * 60 * 1000);
  </script>

</body>
</html>
