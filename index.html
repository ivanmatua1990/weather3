<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Weather LED</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 880px;
      height: 440px;
      background: transparent;
      overflow: hidden;
      position: relative;
      font-family: Arial, sans-serif;
    }

    /* БЛОК 440x80 */
    #weather-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 440px;
      height: 80px;

      background: rgba(0, 0, 0, 0.35);
      color: #fff;

      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 14px;
      box-sizing: border-box;
    }

    #icon {
      font-size: 42px;
      width: 50px;
      text-align: center;
    }

    #temp {
      font-size: 38px;
      font-weight: bold;
    }

    #info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #city {
      font-size: 18px;
      font-weight: bold;
    }

    #desc {
      font-size: 14px;
    }

    #time {
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div id="weather-bar">
    <div id="icon">⛅</div>
    <div id="temp">--°</div>

    <div id="info">
      <div id="city">Караганда</div>
      <div id="desc">Загрузка погоды...</div>
      <div id="time"></div>
    </div>
  </div>

  <script>
    const LAT = 49.8047;
    const LON = 73.1094;

    const map = {
      0:["☀️","Ясно"],
      1:["🌤️","Преимущественно ясно"],
      2:["⛅","Переменная облачность"],
      3:["☁️","Пасмурно"],
      45:["🌫️","Туман"],
      48:["🌫️","Туман"],
      61:["🌧️","Дождь"],
      63:["🌧️","Дождь"],
      65:["🌧️","Сильный дождь"],
      71:["🌨️","Снег"],
      73:["🌨️","Снег"],
      75:["❄️","Сильный снег"],
      95:["⛈️","Гроза"]
    };

    async function loadWeather() {
      try {
        const url =
          `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
          `&current=temperature_2m,weather_code&timezone=Asia%2FAlmaty`;

        const res = await fetch(url);
        const data = await res.json();

        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        const weather = map[code] || ["⛅", "Погода"];

        document.getElementById("icon").textContent = weather[0];
        document.getElementById("temp").textContent = temp + "°";
        document.getElementById("desc").textContent = weather[1];

        document.getElementById("time").textContent =
          new Date().toLocaleTimeString("ru-RU", {
            hour: "2-digit",
            minute: "2-digit"
          });

      } catch (e) {
        document.getElementById("desc").textContent = "Нет данных";
      }
    }

    loadWeather();
    setInterval(loadWeather, 600000);
  </script>

</body>
</html>
