<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Weather LED</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #weather-bar {
      position: absolute;
      top: 0;
      left: 0;

      width: 50vw;     /* 440px из 880 */
      height: 18vh;    /* 80px из 440 */

      background: rgba(0,0,0,0.35);
      color: white;

      display: flex;
      align-items: center;
      gap: 1vw;
      padding: 1vh 1vw;
      box-sizing: border-box;
    }

    #icon {
      font-size: 5vh;
      width: 6vh;
    }

    #temp {
      font-size: 6vh;
      font-weight: bold;
    }

    #info {
      display: flex;
      flex-direction: column;
    }

    #city {
      font-size: 2.5vh;
      font-weight: bold;
    }

    #desc {
      font-size: 2vh;
    }

    #time {
      font-size: 1.8vh;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="weather-bar">
  <div id="icon">⛅</div>
  <div id="temp">--°</div>
  <div id="info">
    <div id="city">Караганда</div>
    <div id="desc">Загрузка...</div>
    <div id="time"></div>
  </div>
</div>

<script>
const LAT = 49.8047;
const LON = 73.1094;

const map = {
  0:["☀️","Ясно"],1:["🌤️","Ясно"],2:["⛅","Облачно"],3:["☁️","Пасмурно"],
  61:["🌧️","Дождь"],71:["🌨️","Снег"],95:["⛈️","Гроза"]
};

async function load(){
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code&timezone=Asia%2FAlmaty`);
  const d = await r.json();

  const t = Math.round(d.current.temperature_2m);
  const c = d.current.weather_code;
  const w = map[c] || ["⛅","Погода"];

  document.getElementById("icon").textContent = w[0];
  document.getElementById("temp").textContent = t + "°";
  document.getElementById("desc").textContent = w[1];

  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
}

load();
setInterval(load, 600000);
</script>

</body>
</html>
