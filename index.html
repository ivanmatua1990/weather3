<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Weather Full LED</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 880px;
      height: 440px;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      box-sizing: border-box;
    }

    /* ЛЕВАЯ ЧАСТЬ */
    #left {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    #icon img {
      width: 120px;
      height: 120px;
    }

    #temp {
      font-size: 110px;
      font-weight: bold;
      line-height: 1;
    }

    #info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #city {
      font-size: 36px;
      font-weight: bold;
    }

    #desc {
      font-size: 24px;
    }

    #wind {
      font-size: 22px;
      opacity: 0.9;
    }

    /* ПРАВАЯ ЧАСТЬ (ВРЕМЯ) */
    #time {
      font-size: 140px;
      font-weight: bold;
      text-align: right;
      line-height: 1;
    }
  </style>
</head>

<body>

<div id="container">

  <div id="left">
    <div id="icon"><img src=""></div>

    <div>
      <div id="temp">--°</div>
      <div id="info">
        <div id="city">Караганда</div>
        <div id="desc">Загрузка...</div>
        <div id="wind">Ветер: --</div>
      </div>
    </div>
  </div>

  <div id="time">--:--</div>

</div>

<script>
const LAT = 49.8047;
const LON = 73.1094;

const iconMap = {
  0:"https://cdn-icons-png.flaticon.com/512/869/869869.png",
  1:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
  2:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
  3:"https://cdn-icons-png.flaticon.com/512/414/414825.png",
  61:"https://cdn-icons-png.flaticon.com/512/414/414974.png",
  71:"https://cdn-icons-png.flaticon.com/512/642/642102.png",
  95:"https://cdn-icons-png.flaticon.com/512/1146/1146860.png"
};

const descMap = {
  0:"Ясно",1:"Ясно",2:"Облачно",3:"Пасмурно",
  61:"Дождь",71:"Снег",95:"Гроза"
};

function windDirection(deg) {
  const dirs = ["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
  return dirs[Math.round(deg / 45) % 8];
}

function updateTime() {
  document.getElementById("time").textContent =
    new Date().toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });
}

async function loadWeather() {
  try {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m` +
      `&timezone=Asia%2FAlmaty`;

    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    const windSpeed = Math.round(data.current.wind_speed_10m);
    const windDeg = data.current.wind_direction_10m;

    document.getElementById("temp").textContent = temp + "°";
    document.getElementById("desc").textContent = descMap[code] || "Погода";
    document.getElementById("wind").textContent =
      `Ветер: ${windSpeed} км/ч ${windDirection(windDeg)}`;

    document.querySelector("#icon img").src =
      iconMap[code] || iconMap[2];

  } catch (e) {
    document.getElementById("desc").textContent = "Нет данных";
  }
}

updateTime();
loadWeather();

setInterval(updateTime, 1000);
setInterval(loadWeather, 600000);
</script>

</body>
</html>
