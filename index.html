<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Weather LED</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 880px;
      height: 440px;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* ЛЕВАЯ ПАНЕЛЬ 440×440 */
    #panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 440px;
      height: 440px;

      background: linear-gradient(180deg, #111, #000);
      border-right: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
    }

    /* ПОГОДА 440×80 */
    #weather-bar {
      width: 440px;
      height: 80px;

      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 14px;
      box-sizing: border-box;

      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #icon img {
      width: 48px;
      height: 48px;
    }

    #temp {
      font-size: 38px;
      font-weight: bold;
    }

    #info {
      display: flex;
      flex-direction: column;
    }

    #city {
      font-size: 18px;
      font-weight: bold;
    }

    #desc {
      font-size: 14px;
    }

    #wind {
      font-size: 14px;
    }

    #time {
      margin-left: auto;
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="panel">

    <div id="weather-bar">
      <div id="icon"><img src=""></div>
      <div id="temp">--°</div>

      <div id="info">
        <div id="city">Караганда</div>
        <div id="desc">Загрузка...</div>
        <div id="wind">Ветер: --</div>
      </div>

      <div id="time">--:--</div>
    </div>

  </div>

<script>
const LAT = 49.8047;
const LON = 73.1094;

const iconMap = {
  0:"https://cdn-icons-png.flaticon.com/512/869/869869.png",
  1:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
  2:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
  3:"https://cdn-icons-png.flaticon.com/512/414/414825.png",
  61:"https://cdn-icons-png.flaticon.com/512/414/414974.png",
  71:"https://cdn-icons-png.flaticon.com/512/642/642102.png",
  95:"https://cdn-icons-png.flaticon.com/512/1146/1146860.png"
};

const descMap = {
  0:"Ясно",1:"Ясно",2:"Облачно",3:"Пасмурно",
  61:"Дождь",71:"Снег",95:"Гроза"
};

function windDirection(deg) {
  const dirs = ["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
  return dirs[Math.round(deg / 45) % 8];
}

function updateTime() {
  document.getElementById("time").textContent =
    new Date().toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });
}

async function loadWeather() {
  try {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m` +
      `&timezone=Asia%2FAlmaty`;

    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    const windSpeed = Math.round(data.current.wind_speed_10m);
    const windDeg = data.current.wind_direction_10m;

    document.getElementById("temp").textContent = temp + "°";
    document.getElementById("desc").textContent = descMap[code] || "Погода";
    document.getElementById("wind").textContent =
      `Ветер: ${windSpeed} км/ч ${windDirection(windDeg)}`;

    document.querySelector("#icon img").src =
      iconMap[code] || iconMap[2];

  } catch {
    document.getElementById("desc").textContent = "Нет данных";
  }
}

updateTime();
loadWeather();

setInterval(updateTime, 1000);
setInterval(loadWeather, 600000);
</script>

</body>
</html>
