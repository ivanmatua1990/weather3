<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Weather Dual LED</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 880px;
      height: 440px;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #background {
      position: absolute;
      width: 880px;
      height: 440px;
      background: linear-gradient(180deg, #0a0a0a, #000);
    }

    .weather-bar {
      position: absolute;
      top: 0;
      width: 440px;
      height: 80px;

      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 50px; /* увеличили отступ */

      box-sizing: border-box;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #left  { left: 0; }
    #right { left: 440px; }

    .icon img {
      width: 48px;
      height: 48px;
    }

    .temp {
      font-size: 36px;
      font-weight: bold;
    }

    .info {
      display: flex;
      flex-direction: column;
      margin-left: 12px; /* дополнительный сдвиг вправо */
    }

    .city {
      font-size: 18px;
      font-weight: bold;
    }

    .desc, .wind {
      font-size: 14px;
    }

    .time {
      margin-left: auto;
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="background"></div>

<!-- ЛЕВЫЙ -->
<div class="weather-bar" id="left">
  <div class="icon"><img id="icon1"></div>
  <div class="temp" id="temp1">--°</div>

  <div class="info">
    <div class="city">Караганда</div>
    <div class="desc" id="desc1">Загрузка...</div>
    <div class="wind" id="wind1">Ветер: --</div>
  </div>

  <div class="time" id="time1">--:--</div>
</div>

<!-- ПРАВЫЙ -->
<div class="weather-bar" id="right">
  <div class="icon"><img id="icon2"></div>
  <div class="temp" id="temp2">--°</div>

  <div class="info">
    <div class="city">Караганда</div>
    <div class="desc" id="desc2">Загрузка...</div>
    <div class="wind" id="wind2">Ветер: --</div>
  </div>

  <div class="time" id="time2">--:--</div>
</div>

<script>
const LAT = 49.8047;
const LON = 73.1094;

const iconMap = {
  0:"https://cdn-icons-png.flaticon.com/512/869/869869.png",
  1:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
  2:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
  3:"https://cdn-icons-png.flaticon.com/512/414/414825.png",
  61:"https://cdn-icons-png.flaticon.com/512/414/414974.png",
  71:"https://cdn-icons-png.flaticon.com/512/642/642102.png",
  95:"https://cdn-icons-png.flaticon.com/512/1146/1146860.png"
};

const descMap = {
  0:"Ясно",1:"Ясно",2:"Облачно",3:"Пасмурно",
  61:"Дождь",71:"Снег",95:"Гроза"
};

function windDir(d){
  const dirs=["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
  return dirs[Math.round(d/45)%8];
}

function updateTime(){
  const t = new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("time1").textContent = t;
  document.getElementById("time2").textContent = t;
}

async function loadWeather(id){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia%2FAlmaty`;
  const r=await fetch(url);
  const d=await r.json();

  const temp=Math.round(d.current.temperature_2m);
  const code=d.current.weather_code;
  const ws=Math.round(d.current.wind_speed_10m);
  const wd=d.current.wind_direction_10m;

  document.getElementById("temp"+id).textContent=temp+"°";
  document.getElementById("desc"+id).textContent=descMap[code]||"Погода";
  document.getElementById("wind"+id).textContent=`Ветер: ${ws} км/ч ${windDir(wd)}`;
  document.getElementById("icon"+id).src=iconMap[code]||iconMap[2];
}

updateTime();
setInterval(updateTime,1000);

loadWeather(1);
loadWeather(2);

setInterval(()=>loadWeather(1),600000);
setInterval(()=>loadWeather(2),600000);
</script>

</body>
</html>
